# SAMP_Diff_v1 — PushT lowdim config
# Based on Freqpolicy pusht.yaml; DiffLoss replaced by Flow Matching + A2A warm-start.

_target_: diffusion_policy.workspace.train_samp_image_workspace.TrainSampImageWorkspace

action_dim: 2
horizon: 16
n_obs_steps: 4
n_action_steps: 8
n_latency_steps: 0
obs_as_global_cond: true
obs_as_local_cond: false
pred_action_steps_only: false
oa_step_convention: true

checkpoint:
  save_last_ckpt: true
  save_last_snapshot: false
  topk:
    format_str: epoch={epoch:04d}-test_mean_score={test_mean_score:.3f}.ckpt
    k: 5
    mode: max
    monitor_key: test_mean_score

dataloader:
  batch_size: 256
  num_workers: 1
  persistent_workers: false
  pin_memory: true
  shuffle: true

val_dataloader:
  batch_size: 256
  num_workers: 1
  persistent_workers: false
  pin_memory: true
  shuffle: false

ema:
  _target_: diffusion_policy.model.diffusion.ema_model.EMAModel
  inv_gamma: 1.0
  max_value: 0.9999
  min_value: 0.0
  power: 0.75
  update_after_step: 0

exp_name: default

logging:
  group: null
  id: null
  mode: offline
  project: samp_diff_v3
  entity: null
  name: train_samp_image_pusht_v3
  resume: true
  tags:
    - samp_image
    - pusht_image
    - v3_resnet18

multi_run:
  run_dir: data/outputs/samp_lowdim_pusht
  wandb_name_base: samp_lowdim_pusht

optimizer:
  _target_: torch.optim.AdamW
  betas:
    - 0.95
    - 0.999
  eps: 1.0e-08
  lr: 0.0001
  weight_decay: 1.0e-06

training:
  device: cuda:0
  seed: 42
  debug: false
  resume: true
  lr_scheduler: cosine
  lr_warmup_steps: 500
  num_epochs: 8000
  gradient_accumulate_every: 1
  use_ema: true
  rollout_every: 50
  checkpoint_every: 50
  val_every: 1
  sample_every: 5
  max_train_steps: null
  max_val_steps: null
  tqdm_interval_sec: 1.0

shape_meta:
  obs:
    image:
      shape: [3, 96, 96]
      type: rgb
    agent_pos:
      shape: [2]
      type: low_dim
  action:
    shape: [2]

policy:
  _target_: diffusion_policy.policy.samp_image_policy.SampImagePolicy

  # ---- Shape metadata (drives encoder + action dim) ----
  shape_meta: ${shape_meta}

  # ---- Dimensions ----
  horizon: ${horizon}
  n_action_steps: ${n_action_steps}
  n_obs_steps: ${n_obs_steps}

  # ---- Policy convention ----
  pred_action_steps_only: ${pred_action_steps_only}
  oa_step_convention: ${oa_step_convention}

  # ---- Image encoder (ResNet18) ----
  crop_shape: [76, 76]        # random crop for training augmentation
  use_group_norm: true
  imagenet_norm: true

  # ---- SampNet Transformer ----
  encoder_embed_dim: 512
  decoder_embed_dim: 512
  encoder_depth: 6
  decoder_depth: 6
  encoder_num_heads: 8
  decoder_num_heads: 8
  mask: false
  num_iter: 4

  # ---- Flow Matching ----
  num_inference_steps: 6      # Euler ODE steps at inference
  fm_sigma: 0.0               # ConditionalFlowMatcher sigma (0 = straight paths)

  # ---- A2A warm-start ----
  sigma: 0.3                  # noise level added to warm-start band
  cold_start_prob: 0.3        # fraction of training batches that use N(0,I) as x_0
  freq_split_low: 0           # warm-start band start  (inclusive)
  freq_split_high: 8          # warm-start band end    (exclusive)
  sigma_high: 0.2             # noise for out-of-band freqs; <0 = pure N(0,I) (original v2)
  # sigma_high guide:
  #   -1.0  → pure random (v2 original, high Discontinuity)
  #    0.2  → strong memory, target: halve Discontinuity
  #    0.5  → medium memory
  #    0.0  → same as sigma (≈ v1 full warm-start)

task:
  dataset:
    _target_: diffusion_policy.dataset.pusht_image_dataset.PushTImageDataset
    horizon: ${horizon}
    max_train_episodes: null
    pad_after: 7
    pad_before: 1
    seed: 42
    val_ratio: 0.02
    zarr_path: data/pusht/pusht_cchi_v7_replay.zarr

  env_runner:
    _target_: diffusion_policy.env_runner.pusht_image_runner.PushTImageRunner
    max_steps: 300
    n_envs: null
    n_obs_steps: ${n_obs_steps}
    n_action_steps: ${n_action_steps}
    fps: 10
    crf: 22
    render_size: 96
    tqdm_interval_sec: 5.0
    n_train: 6
    n_train_vis: 2
    train_start_seed: 0
    n_test: 50
    n_test_vis: 4
    test_start_seed: 100000
    past_action: false
    output_dir: ${hydra:runtime.output_dir}
