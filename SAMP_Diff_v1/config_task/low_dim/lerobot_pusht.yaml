# SAMP_Diff_v1 — LeRobot PushT config
# 2D 基準任務：方塊推進目標區域
# 資料集自動從 HuggingFace Hub 下載（lerobot/pusht）
# 模擬環境：gym_pusht/PushT-v0（需 pip install gym-pusht）

_target_: diffusion_policy.workspace.train_samp_lowdim_workspace.TrainSampLowdimWorkspace

# ── 維度 ─────────────────────────────────────────────────────────────
# PushT: state=[agent_pos(2), block_pos(2), block_angle(1)] → obs_dim=5
#        action=[velocity_x, velocity_y]                   → action_dim=2
action_dim: 2
obs_dim: 5
horizon: 16
n_obs_steps: 2
n_action_steps: 8
n_latency_steps: 0
obs_as_global_cond: true
obs_as_local_cond: false
pred_action_steps_only: false
oa_step_convention: true

checkpoint:
  save_last_ckpt: true
  save_last_snapshot: false
  topk:
    format_str: epoch={epoch:04d}-test_mean_score={test_mean_score:.3f}.ckpt
    k: 5
    mode: max
    monitor_key: test_mean_score

dataloader:
  batch_size: 256
  num_workers: 4
  persistent_workers: false
  pin_memory: true
  shuffle: true

val_dataloader:
  batch_size: 256
  num_workers: 4
  persistent_workers: false
  pin_memory: true
  shuffle: false

ema:
  _target_: diffusion_policy.model.diffusion.ema_model.EMAModel
  inv_gamma: 1.0
  max_value: 0.9999
  min_value: 0.0
  power: 0.75
  update_after_step: 0

exp_name: default

logging:
  group: null
  id: null
  mode: offline
  project: samp_diff_v1
  entity: null
  name: train_samp_lowdim_lerobot_pusht
  resume: true
  tags:
    - samp_lowdim
    - lerobot
    - pusht

multi_run:
  run_dir: data/outputs/samp_lowdim_lerobot_pusht
  wandb_name_base: samp_lowdim_lerobot_pusht

optimizer:
  _target_: torch.optim.AdamW
  betas:
    - 0.95
    - 0.999
  eps: 1.0e-08
  lr: 0.0001
  weight_decay: 1.0e-06

training:
  device: cuda:0
  seed: 42
  debug: false
  resume: true
  lr_scheduler: cosine
  lr_warmup_steps: 500
  num_epochs: 2050
  gradient_accumulate_every: 1
  use_ema: true
  rollout_every: 50
  checkpoint_every: 50
  val_every: 1
  sample_every: 5
  max_train_steps: null
  max_val_steps: null
  tqdm_interval_sec: 1.0

policy:
  _target_: diffusion_policy.policy.samp_lowdim_policy.SampLowdimPolicy

  horizon: ${horizon}
  obs_dim: ${obs_dim}
  action_dim: ${action_dim}
  n_action_steps: ${n_action_steps}
  n_obs_steps: ${n_obs_steps}
  obs_as_global_cond: ${obs_as_global_cond}
  obs_as_local_cond: ${obs_as_local_cond}
  pred_action_steps_only: ${pred_action_steps_only}
  oa_step_convention: ${oa_step_convention}

  # SampNet Transformer（PushT 較小任務，使用較小模型）
  encoder_embed_dim: 256
  decoder_embed_dim: 256
  encoder_depth: 4
  decoder_depth: 4
  encoder_num_heads: 4
  decoder_num_heads: 4
  mask: true
  num_iter: 4

  # Flow Matching
  num_inference_steps: 6
  fm_sigma: 0.0

  # A2A warm-start
  sigma: 0.1

task:
  repo_id: lerobot/pusht
  obs_key: observation.state
  action_key: action

  dataset:
    _target_: diffusion_policy.dataset.lerobot_lowdim_dataset.LeRobotLowdimDataset
    repo_id: ${task.repo_id}
    obs_key: ${task.obs_key}
    action_key: ${task.action_key}
    horizon: ${horizon}
    pad_before: 1
    pad_after: 7
    seed: 42
    val_ratio: 0.02

  env_runner:
    _target_: diffusion_policy.env_runner.lerobot_lowdim_runner.LeRobotLowdimRunner
    gym_env_id: gym_pusht/PushT-v0
    obs_key: ${task.obs_key}
    n_test: 50
    max_steps: 500
    n_obs_steps: ${n_obs_steps}
    n_action_steps: ${n_action_steps}
    fps: 10
    tqdm_interval_sec: 1.0
    output_dir: ${hydra:runtime.output_dir}
